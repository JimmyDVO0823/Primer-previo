<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta | Finanzas Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4f46e5',
            'bg-dark': '#0f172a',
          },
          fontFamily: {
            outfit: ['Outfit', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
    body { font-family: 'Outfit', sans-serif; }
    .glass {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="bg-bg-dark text-slate-100 min-h-screen overflow-x-hidden">
  <div class="flex min-h-screen">
    <!-- Branding Side -->
    <div class="hidden md:flex flex-1 bg-gradient-to-br from-indigo-950 to-emerald-950 relative items-center justify-center overflow-hidden p-16">
      <div class="absolute top-[-100px] left-[-100px] w-96 h-96 bg-emerald-500/10 rounded-full blur-[80px] animate-pulse text-indigo-200"></div>
      <div class="absolute bottom-[-50px] right-[-50px] w-80 h-80 bg-indigo-500/10 rounded-full blur-[80px] animate-pulse delay-700"></div>
      
      <div class="relative z-10 max-w-lg text-indigo-100">
        <h1 class="text-6xl font-extrabold leading-tight mb-6 bg-gradient-to-r from-indigo-400 to-emerald-400 bg-clip-text text-transparent">
          Únete a Pro
        </h1>
        <p class="text-xl text-slate-300 leading-relaxed">
          Comienza tu viaje hacia la libertad financiera. Gestiona activos, visualiza tendencias y alcanza tus objetivos con precisión.
        </p>
      </div>
    </div>
    
    <!-- Form Side -->
    <div class="flex-1 flex items-center justify-center p-6 sm:p-12">
      <div class="w-full max-w-md glass rounded-[2rem] p-8 sm:p-12 shadow-2xl transform transition-all hover:scale-[1.01]">
        <div class="text-center mb-8">
          <h2 class="text-3xl font-bold text-white mb-2">Nueva Cuenta</h2>
          <p class="text-slate-400">Regístrate en segundos</p>
        </div>
        
        <form id="registerForm" class="space-y-5">
          <div class="space-y-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Nombre Completo</label>
            <div class="relative group">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">👤</span>
              <input type="text" id="nombre" name="nombre" placeholder="Juan Pérez" required
                class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl py-3.5 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Correo Electrónico</label>
            <div class="relative group">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">✉️</span>
              <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required
                class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl py-3.5 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Contraseña</label>
            <div class="relative group">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">🔒</span>
              <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required minlength="8"
                class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl py-3.5 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
            </div>
          </div>

          <button type="submit" id="registerBtn" 
            class="w-full group relative flex items-center justify-center py-4 bg-gradient-to-r from-emerald-600 to-indigo-600 text-white font-bold rounded-xl shadow-lg shadow-emerald-900/30 hover:shadow-emerald-900/50 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-300 overflow-hidden">
            <span class="relative z-10 mr-2">Crear Cuenta</span>
            <span class="relative z-10 group-hover:translate-x-1 transition-transform">→</span>
            <div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
          </button>
        </form>

        <div class="mt-8 text-center">
          <p class="text-slate-400">¿Ya tienes cuenta? 
            <a href="login.html" class="text-emerald-400 font-bold hover:text-emerald-300 underline-offset-4 hover:underline transition-colors">
              Inicia sesión aquí
            </a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/api.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
