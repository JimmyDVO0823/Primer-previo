<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | Finanzas Personales</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div class="glass-container">
    <div class="auth-header">
      <h1>Crear Cuenta</h1>
      <p>Únete para administrar tus finanzas</p>
    </div>
    
    <form id="registerForm">
      <div class="form-group">
        <label for="nombre">Nombre Completo</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez" required>
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required minlength="8">
      </div>

      <button type="submit" id="registerBtn" class="btn-primary">Registrarse</button>
    </form>

    <div class="auth-footer">
      <p>¿Ya tienes una cuenta? <a href="login.html">Inicia Sesión</a></p>
    </div>
  </div>

  <script src="./js/api.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
