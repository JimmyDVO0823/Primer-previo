<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión | Finanzas Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/styles.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4f46e5',
            'primary-dark': '#4338ca',
            'bg-dark': '#0f172a',
          },
          fontFamily: {
            outfit: ['Outfit', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
    body { font-family: 'Outfit', sans-serif; }
    .glass {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="bg-bg-dark text-slate-100 min-h-screen overflow-x-hidden">
  <div class="flex min-h-screen">
    <!-- Branding Side -->
    <div class="hidden md:flex flex-1 bg-gradient-to-br from-indigo-950 to-indigo-900 relative items-center justify-center overflow-hidden p-16">
      <div class="absolute top-[-100px] left-[-100px] w-96 h-96 bg-indigo-500/20 rounded-full blur-[80px] animate-pulse"></div>
      <div class="absolute bottom-[-50px] right-[-50px] w-80 h-80 bg-pink-500/10 rounded-full blur-[80px] animate-pulse delay-700"></div>
      
      <div class="relative z-10 max-w-lg">
        <h1 class="text-6xl font-extrabold leading-tight mb-6 bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
          Finanzas Pro
        </h1>
        <p class="text-xl text-indigo-200 leading-relaxed">
          Toma el control total de tus ingresos y gastos con una plataforma inteligente diseñada para tu crecimiento financiero.
        </p>
      </div>
    </div>
    
    <!-- Form Side -->
    <div class="flex-1 flex items-center justify-center p-6 sm:p-12">
      <div class="w-full max-w-md glass rounded-[2rem] p-8 sm:p-12 shadow-2xl transform transition-all hover:scale-[1.01]">
        <div class="text-center mb-10">
          <h2 class="text-3xl font-bold text-white mb-2">Bienvenido</h2>
          <p class="text-slate-400">Ingresa tus credenciales para continuar</p>
        </div>
        
        <form id="loginForm" class="space-y-6">
          <div class="space-y-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Correo Electrónico</label>
            <div class="relative group">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">✉️</span>
              <input type="email" id="email" name="email" placeholder="tucorreo@ejemplo.com" required
                class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl py-4 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Contraseña</label>
            <div class="relative group">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">🔒</span>
              <input type="password" id="password" name="password" placeholder="••••••••" required
                class="w-full bg-slate-900/50 border border-slate-700/50 rounded-xl py-4 pl-12 pr-4 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all">
            </div>
          </div>

          <button type="submit" id="loginBtn" 
            class="w-full group relative flex items-center justify-center py-4 bg-gradient-to-r from-primary to-indigo-500 text-white font-bold rounded-xl shadow-lg shadow-primary/30 hover:shadow-primary/50 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-300 overflow-hidden">
            <span class="relative z-10 mr-2">Iniciar Sesión</span>
            <span class="relative z-10 group-hover:translate-x-1 transition-transform">→</span>
            <div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
          </button>
        </form>

        <div class="mt-6 text-center">
          <div class="relative flex items-center py-4">
            <div class="flex-grow border-t border-slate-700/50"></div>
            <span class="flex-shrink-0 mx-4 text-slate-500 text-xs font-bold uppercase tracking-widest">O</span>
            <div class="flex-grow border-t border-slate-700/50"></div>
          </div>
          <a href="register.html" 
            class="w-full flex items-center justify-center py-4 bg-slate-800/50 hover:bg-slate-700/60 border border-slate-700/50 text-indigo-300 hover:text-white font-bold rounded-xl shadow-sm hover:-translate-y-0.5 active:translate-y-0 transition-all duration-300">
            Crear cuenta nueva
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/api.js"></script>
  <script src="./js/auth.js"></script>
</body>
</html>
