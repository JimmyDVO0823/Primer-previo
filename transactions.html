<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movimientos | Finanzas Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/styles.css">
  <script>
    tailwind.config = { theme: { extend: { colors: { primary: '#4f46e5', 'bg-dark': '#0f172a', 'bg-card': '#1e293b' } } } }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
    body { font-family: 'Outfit', sans-serif; }
    .sidebar-link.active { background: rgba(79, 70, 229, 0.15); border-left: 4px solid #4f46e5; color: white; }
  </style>
</head>
<body class="bg-bg-dark text-slate-100 min-h-screen flex flex-col md:flex-row">
  
  <aside class="w-full md:w-64 bg-slate-900/50 border-r border-slate-800 flex flex-col z-50">
    <a href="index.html" class="p-6 flex items-center gap-3 hover:bg-white/5 transition-all">
      <div class="bg-indigo-600 p-2 rounded-lg shadow-lg shadow-indigo-500/30">
        <span class="text-xl">💰</span>
      </div>
      <h1 class="text-xl font-black bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">Finanzas Pro</h1>
    </a>
    <nav class="flex-1 px-4 space-y-1 mt-4">
      <a href="index.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
        <span>📊</span> Dashboard
      </a>
      <a href="workspaces.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
        <span>💼</span> Workspaces
      </a>
      <a href="categories.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
        <span>🏷️</span> Categorías
      </a>
      <a href="transactions.html" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
        <span>💸</span> Movimientos
      </a>
      <a href="beneficiaries.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
        <span>🤝</span> Beneficiarios
      </a>
    </nav>
  </aside>

  <main class="flex-1 p-8 lg:p-12">
    <header class="flex flex-col sm:flex-row justify-between items-start gap-4 mb-10">
      <div>
        <h2 class="text-3xl font-extrabold text-white">Listado de <span class="text-indigo-400">Movimientos</span></h2>
        <p class="text-slate-400">Registra y supervisa cada centavo de tu patrimonio</p>
      </div>
      <button class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-indigo-600/20 transition-all">
        + Registrar Movimiento
      </button>
    </header>

    <div class="bg-bg-card border border-slate-800 rounded-3xl overflow-hidden shadow-2xl">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-slate-900/50 text-slate-500 uppercase text-[10px] tracking-widest font-black border-b border-slate-800">
              <th class="px-6 py-4">Fecha</th>
              <th class="px-6 py-4">Descripción</th>
              <th class="px-6 py-4">Categoría</th>
              <th class="px-6 py-4">Beneficiario</th>
              <th class="px-6 py-4 text-right">Monto</th>
            </tr>
          </thead>
          <tbody id="transactionBody" class="divide-y divide-slate-800">
            <!-- Dynamically populated -->
          </tbody>
        </table>
      </div>
      <div id="paginationInfo" class="p-6 bg-slate-900/30 flex justify-between items-center text-xs text-slate-500">
        <!-- Dynamically populated -->
      </div>
    </div>
  </main>

  <script src="./js/api.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/transactions.js"></script>
</body>
</html>
